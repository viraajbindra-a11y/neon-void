name: NeonVoid
options:
  bundleIdPrefix: com.neonvoid
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_UIStatusBarHidden: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"

targets:
  NeonVoid:
    type: application
    platform: iOS
    sources:
      - path: NeonVoid
        excludes:
          - WebContent/**
    resources:
      - path: NeonVoid/WebContent
        type: folder
      - path: NeonVoid/Assets.xcassets
      - path: NeonVoid/LaunchScreen.storyboard
    info:
      path: NeonVoid/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonvoid.arcade
        PRODUCT_NAME: NeonVoid
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
