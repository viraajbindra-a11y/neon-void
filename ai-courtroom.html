<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Courtroom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4A847;--gold-dim:#8B6914;--wood:#3E2010;--wood-dark:#2A1608;
  --wood-light:#6B4226;--red:#CC3333;--green:#33BB55;--blue:#3388EE;
  --cream:#FDF6E3;--ink:#1A1A2E;
}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Inter',sans-serif;user-select:none}

/* ========== AMBIENT LIGHT RAYS ========== */
.view::after{
  content:'';position:absolute;top:-20%;left:30%;width:40%;height:70%;
  background:linear-gradient(180deg,rgba(255,220,150,.08) 0%,transparent 100%);
  transform:rotate(-5deg);pointer-events:none;z-index:1;
}
.view::before{
  content:'';position:absolute;top:-10%;right:20%;width:25%;height:60%;
  background:linear-gradient(180deg,rgba(255,200,100,.05) 0%,transparent 100%);
  transform:rotate(8deg);pointer-events:none;z-index:1;
}

/* ========== GAME CONTAINER ========== */
#game{width:100vw;height:100vh;position:relative;overflow:hidden}
#game.shake{animation:shake .35s ease}
@keyframes shake{
  0%,100%{transform:translate(0)}
  15%{transform:translate(-6px,3px)}
  30%{transform:translate(5px,-5px)}
  45%{transform:translate(-3px,2px)}
  60%{transform:translate(4px,-3px)}
  75%{transform:translate(-2px,4px)}
  90%{transform:translate(3px,-2px)}
}
#game.flash{animation:flash .25s}
@keyframes flash{0%{filter:brightness(1)}40%{filter:brightness(4)}100%{filter:brightness(1)}}

/* ========== COURTROOM VIEWS ========== */
.view{position:absolute;inset:0;opacity:0;transition:opacity .45s ease;pointer-events:none}
.view.active{opacity:1}

/* -- Shared courtroom elements -- */
.cr-wall{position:absolute;top:0;left:0;right:0;height:52%;
  background:repeating-linear-gradient(90deg,transparent 0 90px,rgba(0,0,0,.06) 90px 92px),
  linear-gradient(180deg,#2A1608 0%,#4A2A12 50%,#3A1E0C 100%)}
.cr-floor{position:absolute;bottom:0;left:0;right:0;height:28%;
  background:linear-gradient(180deg,#2A1808 0%,#1A0E06 100%)}
.cr-molding{position:absolute;left:0;right:0;height:6px;background:var(--gold);opacity:.6}

/* JUDGE VIEW */
#v-judge .cr-wall{height:48%}
#v-judge .cr-molding{top:48%}
#v-judge .curtain{position:absolute;top:0;width:14%;height:54%;z-index:1}
#v-judge .curtain.L{left:0;background:linear-gradient(90deg,#6B1A1A,#8B2020 60%,#5a1515);border-right:2px solid #9B3030}
#v-judge .curtain.R{right:0;background:linear-gradient(-90deg,#6B1A1A,#8B2020 60%,#5a1515);border-left:2px solid #9B3030}
#v-judge .seal{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:110px;height:110px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;background:rgba(139,105,20,.1);z-index:2}
#v-judge .seal span{font-size:9px;font-weight:800;color:var(--gold);text-align:center;letter-spacing:2px;text-transform:uppercase;line-height:1.5}
#v-judge .bench{position:absolute;top:40%;left:50%;transform:translateX(-50%);width:54%;height:26%;
  background:linear-gradient(180deg,#5c3a1e,#4a2a12 60%,#3a1e0c);border-top:5px solid var(--gold);
  border-left:3px solid rgba(139,105,20,.35);border-right:3px solid rgba(139,105,20,.35);border-radius:4px 4px 0 0;z-index:15}
#v-judge .bench::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:65%;height:3px;background:var(--gold);border-radius:2px;opacity:.7}
#v-judge .bench::after{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);width:40%;height:2px;background:var(--gold);border-radius:2px;opacity:.35}
#v-judge .gavel{position:absolute;top:46%;left:32%;width:30px;height:8px;background:#5c3a1e;border-radius:3px;transform:rotate(-15deg);z-index:4;border:1px solid rgba(139,105,20,.4)}
#v-judge .gavel::after{content:'';position:absolute;right:-8px;top:-4px;width:16px;height:16px;background:#4a2a12;border-radius:3px;border:1px solid rgba(139,105,20,.4)}

/* DEFENSE VIEW */
#v-defense .desk{position:absolute;bottom:24%;left:4%;right:42%;height:15%;z-index:15;
  background:linear-gradient(180deg,#6b4226,#5a3520 50%,#4a2a14);border-top:4px solid var(--gold);border-radius:3px 3px 0 0}
#v-defense .desk::before{content:'';position:absolute;top:7px;left:8%;right:8%;height:2px;background:rgba(139,105,20,.45)}
#v-defense .desk::after{content:'DEFENSE';position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--gold);letter-spacing:3px;opacity:.5}
#v-defense .papers{position:absolute;bottom:29%;left:12%;width:40px;height:30px;background:#e8dcc0;border-radius:2px;transform:rotate(-5deg);z-index:2;box-shadow:2px 2px 8px rgba(0,0,0,.4)}
#v-defense .papers::after{content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;background:repeating-linear-gradient(180deg,transparent 0 4px,#ccc 4px 5px)}

/* PROSECUTION VIEW */
#v-prosecution .desk{position:absolute;bottom:24%;right:4%;left:42%;height:15%;z-index:15;
  background:linear-gradient(180deg,#6b4226,#5a3520 50%,#4a2a14);border-top:4px solid var(--gold);border-radius:3px 3px 0 0}
#v-prosecution .desk::before{content:'';position:absolute;top:7px;left:8%;right:8%;height:2px;background:rgba(139,105,20,.45)}
#v-prosecution .desk::after{content:'PROSECUTION';position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--gold);letter-spacing:3px;opacity:.5}

/* WITNESS VIEW */
#v-witness .stand{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);width:34%;height:18%;z-index:15;
  background:linear-gradient(180deg,#6b4226,#5a3520 50%,#4a2a14);border-top:4px solid var(--gold);
  border-left:3px solid rgba(139,105,20,.25);border-right:3px solid rgba(139,105,20,.25);border-radius:3px 3px 0 0}
#v-witness .stand::after{content:'WITNESS';position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--gold);letter-spacing:3px;opacity:.5}
#v-witness .mic{position:absolute;bottom:34%;left:54%;width:3px;height:24px;background:#555;z-index:4}
#v-witness .mic::after{content:'';position:absolute;top:-6px;left:-4px;width:11px;height:8px;background:#333;border-radius:50%;border:1px solid #666}

/* WIDE VIEW */
#v-wide .hi-bench{position:absolute;top:10%;left:50%;transform:translateX(-50%);width:38%;height:18%;
  background:linear-gradient(180deg,#5c3a1e,#4a2a12);border-top:4px solid var(--gold);border-radius:3px}
#v-wide .lo-desk-l{position:absolute;bottom:30%;left:5%;width:28%;height:9%;
  background:linear-gradient(180deg,#5c3a1e,#4a2a12);border-top:3px solid var(--gold)}
#v-wide .lo-desk-r{position:absolute;bottom:30%;right:5%;width:28%;height:9%;
  background:linear-gradient(180deg,#5c3a1e,#4a2a12);border-top:3px solid var(--gold)}
#v-wide .railing{position:absolute;bottom:24%;left:12%;right:12%;height:3px;background:var(--gold);opacity:.5}
#v-wide .gallery-row{position:absolute;bottom:10%;left:8%;right:8%;display:flex;justify-content:center;gap:18px}
#v-wide .gallery-seat{width:20px;height:24px;background:rgba(139,105,20,.15);border-radius:50% 50% 0 0;border:1px solid rgba(139,105,20,.15)}

/* ========== CHARACTERS ========== */
.char{position:absolute;transition:all .35s ease;opacity:0;z-index:10}
.char.show{opacity:1}
.char.talk{animation:talk .5s infinite alternate}
.char.slam{animation:slam .4s ease}
.char.point{animation:point .45s ease}
.char.sweat{animation:sweat .8s ease}

@keyframes talk{0%{transform:translateY(0)}100%{transform:translateY(-4px)}}
@keyframes slam{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-22px) scale(1.06)}60%{transform:translateY(4px) scale(.97)}100%{transform:translateY(0) scale(1)}}
@keyframes point{0%{transform:translateX(0) scale(1)}40%{transform:translateX(30px) scale(1.04)}100%{transform:translateX(0) scale(1)}}
@keyframes sweat{0%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}

.sprite{position:relative;display:flex;flex-direction:column;align-items:center}
.sprite svg{display:block;filter:drop-shadow(0 8px 20px rgba(0,0,0,.5))}
.sprite .nametag{margin-top:4px;font-size:12px;font-weight:700;letter-spacing:1px;
  text-shadow:0 2px 8px rgba(0,0,0,.9);text-align:center;color:#fff}

/* Positions — characters stand BEHIND the furniture */
.pos-judge{left:50%;bottom:38%;transform:translateX(-50%)}
.pos-center{left:50%;bottom:22%;transform:translateX(-50%)}
.pos-left{left:16%;bottom:22%}
.pos-right{right:16%;bottom:22%}

/* ========== DIALOGUE BOX ========== */
#dlg{position:absolute;bottom:0;left:0;right:0;z-index:100;display:none;flex-direction:column;
  background:linear-gradient(180deg,rgba(10,6,2,.96),#000);border-top:4px solid var(--gold)}
#dlg.on{display:flex}
#dlg-name{display:inline-flex;align-items:center;gap:8px;padding:7px 18px 6px;
  background:linear-gradient(90deg,var(--gold),#B8922E);color:#1a0a04;font-weight:800;font-size:14px;
  align-self:flex-start;letter-spacing:1px;text-transform:uppercase;border-radius:0 0 8px 0;
  box-shadow:2px 2px 10px rgba(0,0,0,.5)}
#dlg-name .dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(0,0,0,.2)}
#dlg-text{padding:12px 22px;font-size:19px;line-height:1.6;color:#fff;min-height:80px;font-weight:500}
#dlg-text .cursor{display:inline-block;width:2px;height:18px;background:var(--gold);animation:blink .6s infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#dlg-hint{padding:4px 22px 10px;font-size:11px;color:var(--gold-dim);text-align:right}
#dlg-hint span{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ========== EFFECT BANNERS ========== */
.fx{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;pointer-events:none}
.fx.go{display:flex;animation:fxLife .9s ease forwards}
@keyframes fxLife{0%{opacity:0}8%{opacity:1}72%{opacity:1}100%{opacity:0}}
.fx .banner{font-family:'Bebas Neue',sans-serif;letter-spacing:8px;font-size:clamp(50px,12vw,110px)}
#fx-objection{background:radial-gradient(ellipse,rgba(200,20,20,.35),rgba(0,0,0,.85))}
#fx-objection .banner{color:#FF3333;text-shadow:0 0 50px rgba(255,0,0,.9),0 6px 0 #8B0000;animation:slamIn .45s ease}
#fx-holdit{background:radial-gradient(ellipse,rgba(20,160,40,.3),rgba(0,0,0,.85))}
#fx-holdit .banner{color:#33DD55;text-shadow:0 0 50px rgba(0,255,50,.9),0 6px 0 #006620;animation:slamIn .45s ease}
#fx-order{background:radial-gradient(ellipse,rgba(200,160,40,.3),rgba(0,0,0,.85))}
#fx-order .banner{color:var(--gold);text-shadow:0 0 50px rgba(212,168,71,.9),0 6px 0 #8B6914;animation:dropIn .45s ease}
#fx-takethat{background:radial-gradient(ellipse,rgba(30,100,200,.3),rgba(0,0,0,.85))}
#fx-takethat .banner{color:#44AAFF;text-shadow:0 0 50px rgba(50,150,255,.9),0 6px 0 #003366;animation:slamIn .45s ease}
@keyframes slamIn{0%{transform:translateX(-110vw) rotate(-8deg) scale(1.4)}45%{transform:translateX(8px) rotate(1deg) scale(1.03)}70%{transform:translateX(-3px) rotate(0)}100%{transform:translateX(0) scale(1)}}
@keyframes dropIn{0%{transform:translateY(-80px) scale(1.5);opacity:0}50%{transform:translateY(8px) scale(.96)}100%{transform:translateY(0) scale(1);opacity:1}}

/* ========== CREDIBILITY METER ========== */
#meters{position:absolute;top:42px;left:12px;right:12px;z-index:110;display:none;gap:8px;justify-content:space-between}
#meters.on{display:flex}
.meter{flex:1;max-width:260px}
.meter-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;display:flex;justify-content:space-between}
.meter-label .name{color:var(--gold)}
.meter-label .val{color:#fff}
.meter-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.meter-fill{height:100%;border-radius:4px;transition:width .6s ease}
.meter.defense .meter-fill{background:linear-gradient(90deg,#3388EE,#66BBFF)}
.meter.prosecution .meter-fill{background:linear-gradient(90deg,#CC3333,#FF6666)}

/* ========== CASE BAR ========== */
#casebar{position:absolute;top:0;left:0;right:0;height:38px;z-index:120;display:none;align-items:center;justify-content:center;gap:16px;
  background:linear-gradient(90deg,#0a0604,#1a0e06,#0a0604);border-bottom:2px solid var(--gold-dim);
  font-size:12px;color:var(--gold-dim);letter-spacing:1px}
#casebar.on{display:flex}
#casebar .title{color:var(--gold);font-weight:700}
#casebar .sep{color:rgba(139,105,20,.3)}

/* ========== SETUP OVERLAY ========== */
#setup{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;transition:opacity .5s}
#setup.gone{opacity:0;pointer-events:none}
.panel{background:linear-gradient(135deg,#12080400,#1a0e06,#12080400);border:3px solid var(--gold);border-radius:14px;
  width:92%;max-width:780px;max-height:92vh;overflow-y:auto;padding:24px 28px;
  box-shadow:0 0 80px rgba(212,168,71,.15),0 20px 60px rgba(0,0,0,.8)}
.panel::-webkit-scrollbar{width:5px}
.panel::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

.panel-hdr{text-align:center;margin-bottom:22px}
.panel-hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2em,5vw,3.2em);color:var(--gold);letter-spacing:8px;
  text-shadow:0 2px 20px rgba(212,168,71,.4)}
.panel-hdr p{color:var(--gold-dim);font-size:.82em;margin-top:2px}

.sec{margin-bottom:18px}
.sec h3{color:var(--gold);font-size:.72em;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(212,168,71,.15)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid2 .full{grid-column:1/-1}
.fld label{display:block;font-size:.65em;font-weight:700;color:var(--gold-dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}
.fld input,.fld textarea,.fld select{width:100%;padding:7px 10px;border:2px solid rgba(212,168,71,.2);border-radius:5px;
  background:rgba(0,0,0,.5);color:#e8dcc8;font-family:'Inter',sans-serif;font-size:.85em;transition:border-color .2s}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 12px rgba(212,168,71,.15)}
.fld textarea{min-height:44px;resize:vertical}
.fld select option{background:#1a0e06}

.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:6px}
.ri{display:flex;flex-direction:column;gap:3px;padding:6px 8px;background:rgba(0,0,0,.25);border:1px solid rgba(212,168,71,.1);border-radius:6px;transition:border-color .2s}
.ri:hover{border-color:rgba(212,168,71,.3)}
.ri.filled{border-color:rgba(212,168,71,.4);background:rgba(212,168,71,.05)}
.ri label{font-size:.6em;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.ri select{padding:5px 6px;border:1px solid rgba(212,168,71,.15);border-radius:4px;background:rgba(0,0,0,.4);color:#e8dcc8;font-size:.8em}
.ri select:focus{outline:none;border-color:var(--gold)}
.ri select option{background:#1a0e06}
.ri .ai-preview{display:flex;align-items:center;gap:6px;margin-top:3px;min-height:22px}
.ri .ai-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.ri .ai-info{font-size:.65em;color:#998877;line-height:1.2}
.ri .ai-info strong{color:#e8dcc8;display:block;font-size:1.1em}

.btns{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}
.btn{padding:11px 28px;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:.9em;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn-go{background:linear-gradient(135deg,var(--gold),#B8922E);color:#1a0a04;box-shadow:0 4px 20px rgba(212,168,71,.4)}
.btn-go:hover{box-shadow:0 6px 30px rgba(212,168,71,.6)}
.btn-rand{background:rgba(212,168,71,.12);color:var(--gold);border:2px solid var(--gold)}
.btn-rand:hover{background:rgba(212,168,71,.22)}

/* ========== COURT ADJOURNED ========== */
#endscreen{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#endscreen.on{display:flex}
#endscreen h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2em,7vw,4em);color:var(--gold);letter-spacing:8px;
  text-shadow:0 4px 30px rgba(212,168,71,.5);animation:endIn .8s ease}
#endscreen .verdict-text{font-size:1.1em;color:#ccc;text-align:center;max-width:500px;line-height:1.5}
@keyframes endIn{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}

/* back btn */
#backbtn{position:fixed;top:8px;left:8px;z-index:150;padding:6px 14px;background:rgba(0,0,0,.6);border:1px solid rgba(212,168,71,.25);
  border-radius:5px;color:var(--gold);font-size:.75em;font-weight:600;cursor:pointer;display:none;transition:background .2s}
#backbtn:hover{background:rgba(0,0,0,.85)}

/* speed control */
#speed-ctrl{position:fixed;top:8px;right:8px;z-index:150;display:none;gap:4px;align-items:center}
#speed-ctrl.on{display:flex}
#speed-ctrl button{padding:4px 10px;background:rgba(0,0,0,.6);border:1px solid rgba(212,168,71,.2);border-radius:4px;color:var(--gold-dim);font-size:.7em;font-weight:600;cursor:pointer}
#speed-ctrl button.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,71,.15)}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr}
  .rgrid{grid-template-columns:1fr 1fr}
  .panel{padding:16px 14px}
  #dlg-text{font-size:16px;padding:10px 16px}
  .sprite .head{width:56px;height:56px;font-size:18px}
  .sprite .body svg{transform:scale(.8)}
  .meter{max-width:45%}
}
</style>
</head>
<body>
<div id="game">
  <!-- === VIEWS === -->
  <div class="view active" id="v-judge">
    <div class="cr-wall"></div><div class="cr-molding" style="top:48%"></div>
    <div class="curtain L"></div><div class="curtain R"></div>
    <div class="seal"><span>In AI<br>We<br>Trust</span></div>
    <div class="bench"></div><div class="gavel"></div>
    <div class="cr-floor"></div>
  </div>
  <div class="view" id="v-defense">
    <div class="cr-wall"></div><div class="cr-molding" style="top:50%"></div>
    <div class="desk"></div><div class="papers"></div>
    <div class="cr-floor"></div>
  </div>
  <div class="view" id="v-prosecution">
    <div class="cr-wall"></div><div class="cr-molding" style="top:50%"></div>
    <div class="desk"></div>
    <div class="cr-floor"></div>
  </div>
  <div class="view" id="v-witness">
    <div class="cr-wall"></div><div class="cr-molding" style="top:50%"></div>
    <div class="stand"></div><div class="mic"></div>
    <div class="cr-floor"></div>
  </div>
  <div class="view" id="v-wide">
    <div class="cr-wall"></div><div class="cr-molding" style="top:48%"></div>
    <div class="hi-bench"></div>
    <div class="lo-desk-l"></div><div class="lo-desk-r"></div>
    <div class="railing"></div>
    <div class="cr-floor"></div>
    <div class="gallery-row"><div class="gallery-seat"></div><div class="gallery-seat"></div><div class="gallery-seat"></div><div class="gallery-seat"></div><div class="gallery-seat"></div><div class="gallery-seat"></div><div class="gallery-seat"></div><div class="gallery-seat"></div></div>
  </div>

  <!-- Characters go here -->
  <div id="chars" style="position:absolute;inset:0;z-index:10;pointer-events:none"></div>

  <!-- Case bar -->
  <div id="casebar"><span class="title" id="cb-title"></span><span class="sep">|</span><span id="cb-court"></span></div>

  <!-- Credibility meters -->
  <div id="meters">
    <div class="meter defense"><div class="meter-label"><span class="name">Defense</span><span class="val" id="m-def-val">100</span></div><div class="meter-bar"><div class="meter-fill" id="m-def-fill" style="width:100%"></div></div></div>
    <div class="meter prosecution"><div class="meter-label"><span class="name">Prosecution</span><span class="val" id="m-pro-val">100</span></div><div class="meter-bar"><div class="meter-fill" id="m-pro-fill" style="width:100%"></div></div></div>

</div>

<div class="fx" id="fx-objection"><div class="banner">OBJECTION!</div></div>
<div class="fx" id="fx-holdit"><div class="banner">HOLD IT!</div></div>

<button id="backbtn" onclick="reset()">&#9664; Setup</button>
<div id="speed-ctrl"><button onclick="setSpeed(1)" class="active" id="sp1">1x</button><button onclick="setSpeed(2)" id="sp2">2x</button><button onclick="setSpeed(0)" id="sp0">Auto</button></div>

<!-- Setup -->
<div id="setup">
  <div class="panel">
    <div class="panel-hdr">
      <h1>AI Courtroom</h1>
      <p>Ace Attorney Style &mdash; Assign AIs, set the scene, watch them battle it out</p>

<!-- End screen -->

</div>

<script>
/* ============================================================
   AI MODELS — each with unique color, personality, quirks
   ============================================================ */
const AI=[

const CASES=[
  {name:'Humanity v. Pineapple Pizza',desc:'The defendant is accused of crimes against culinary decency by existing on pizza. Millions traumatized.',court:'meme',tone:'funny'},

/* ============================================================
   STATE
   ============================================================ */
let state={running:false,lineIdx:0,typing:false,timer:null,speed:1,waitClick:false,
  defHP:100,proHP:100,lines:[],autoMode:false};

/* ============================================================
   SETUP
   ============================================================ */
const rgrid=document.getElementById('rgrid');
ROLES.forEach(r=>{
  const d=document.createElement('div');d.className='ri';d.id='ri-'+r.id;
  d.innerHTML=`<label>${r.icon} ${r.label}</label><select id="r-${r.id}" onchange="updatePreview('${r.id}')"><option value="">-- None --</option>${AI.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select><div class="ai-preview" id="prev-${r.id}"></div>`;

function updatePreview(roleId){
  const sel=document.getElementById('r-'+roleId);
  const prev=document.getElementById('prev-'+roleId);
  const ri=document.getElementById('ri-'+roleId);
  const ai=AI.find(a=>a.id===sel.value);
  if(ai){
    prev.innerHTML=`<div class="ai-dot" style="background:${ai.color}"></div><div class="ai-info"><strong>${ai.name}</strong>${ai.personality}</div>`;
    ri.classList.add('filled');
  }else{
    prev.innerHTML='';ri.classList.remove('filled');
  }
}

function randomize(){
  // 50% chance: use a preset case, 50% chance: generate dynamically
  if(Math.random()<0.5){
    const c=CASES[Math.floor(Math.random()*CASES.length)];
    document.getElementById('s-name').value=c.name;
    document.getElementById('s-desc').value=c.desc;
    document.getElementById('s-court').value=c.court;
    document.getElementById('s-tone').value=c.tone;
  }else{
    // Dynamic case generation
    const plaintiffs=['Humanity','The Internet','All Developers','Reddit','Gen Z','Boomers','The Cloud','Your WiFi','Every Student Ever','Gamers United','Night Owls International','Dog People','Cat People','The Entire IT Department'];
    const defendants=['Pineapple Pizza','Comic Sans','Monday Mornings','JavaScript','Reply All','Autocorrect','Dark Mode Haters','People Who Don\'t Use Turn Signals','Whoever Invented Alarm Clocks','The "Works On My Machine" Guy','People Who Microwave Fish At Work','Infinite Scroll','Password Requirements','Daylight Saving Time'];
    const crimes=['crimes against humanity','gross incompetence','public nuisance','identity theft','emotional terrorism','aggravated annoyance','conspiracy to waste everyone\'s time','first-degree cringe','felony buzzkill','reckless disregard for sanity','weaponized mediocrity','criminal overconfidence'];
    const p=pick(plaintiffs),d=pick(defendants),cr=pick(crimes);
    document.getElementById('s-name').value=p+' v. '+d;
    document.getElementById('s-desc').value=d+' stands accused of '+cr+'. '+p+' demands justice. The world watches.';
    const courts=['criminal','civil','supreme','meme','intergalactic'];
    const tones=['serious','dramatic','funny','chaotic'];
    document.getElementById('s-court').value=pick(courts);
    document.getElementById('s-tone').value=pick(tones);
  }
  const sh=[...AI].sort(()=>Math.random()-.5);
  ROLES.forEach((r,i)=>{document.getElementById('r-'+r.id).value=sh[i].id;updatePreview(r.id);});
}

/* ============================================================
   RENDERING
   ============================================================ */
function getAI(id){return AI.find(a=>a.id===id)}
function role(id){return document.getElementById('r-'+id)?.value||''}
function roleName(id){const a=getAI(role(id));return a?a.name:'???'}
function roleColor(id){const a=getAI(role(id));return a?a.color:'#888'}
function roleAI(id){return getAI(role(id))}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('v-'+v);if(el)el.classList.add('active');
}

      <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#222"/><stop offset="100%" stop-color="#111"/></linearGradient></defs>

      <circle cx="102" cy="46" r="3" fill="rgba(255,255,255,.8)"/>
      <path d="M82,60 Q90,66 98,60" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>

}

function showChar(roleId){
  const r=ROLES.find(x=>x.id===roleId);if(!r)return;
  const aiId=role(roleId);if(!aiId)return;
  const layer=document.getElementById('chars');
  layer.innerHTML=`<div class="char show pos-${r.pos}" id="active-char">${buildSprite(aiId,r.style)}</div>`;
}

function clearChars(){document.getElementById('chars').innerHTML=''}

function setScene(roleId){
  const r=ROLES.find(x=>x.id===roleId);
  if(!r){switchView('wide');clearChars();return;}
  switchView(r.view);
  clearChars();
  showChar(roleId);
}

/* ============================================================
   DIALOGUE ENGINE (fixed — no freeze!)
   ============================================================ */
function showDlg(on){document.getElementById('dlg').classList.toggle('on',on)}

function setName(name,color){
  document.getElementById('dlg-speaker').textContent=name;
  document.getElementById('dlg-dot').style.background=color;
}

let resolveAdvance=null;

function typewrite(text){
  return new Promise(resolve=>{
    const el=document.getElementById('dlg-text');
    const hint=document.getElementById('dlg-hint');
    el.innerHTML='';hint.style.display='none';
    let i=0;state.typing=true;
    // Store resolve IMMEDIATELY so skip can use it
    resolveAdvance=resolve;
    const spd=state.speed===2?12:25;
    function tick(){
      if(!state.running){state.typing=false;resolve();return;}
      if(i<text.length){
        el.textContent=text.substring(0,i+1);
        i++;state.timer=setTimeout(tick,spd);
      }else{
        state.typing=false;
        el.innerHTML=text;
        hint.style.display='block';
        if(state.autoMode){setTimeout(()=>{
          if(resolveAdvance===resolve){resolveAdvance=null;resolve();}
        },800);return;}
        // resolveAdvance already set — just wait for click
      }
    }
    tick();
  });
}

function finishTyping(){
  clearTimeout(state.timer);
  state.typing=false;
  const line=state.lines[state.lineIdx];
  const text=line?fillTpl(line.text):'';
  document.getElementById('dlg-text').textContent=text;
  document.getElementById('dlg-hint').style.display='block';
  // resolveAdvance is already set from typewrite — next click will advance
}

// Global input handler — ONE handler, no race conditions
function handleAdvance(){
  if(!state.running)return;
  if(state.typing){
    // Skip to end — show full text, stop at "waiting for click"
    finishTyping();
    return;
  }
  if(resolveAdvance){
    const fn=resolveAdvance;
    resolveAdvance=null;
    fn();
  }
}
document.addEventListener('click',handleAdvance);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();handleAdvance();}
});

function animChar(anim){
  const el=document.getElementById('active-char');
  if(!el||!anim)return;
  el.classList.remove('talk','slam','point','sweat');
  void el.offsetWidth; // reflow
  el.classList.add(anim);
  if(anim!=='talk')setTimeout(()=>el.classList.remove(anim),500);
}

async function playFx(id){
  if(!id)return;
  const el=document.getElementById('fx-'+id);if(!el)return;
  el.classList.add('go');
  document.getElementById('game').classList.add('shake');
  if(id==='order')document.getElementById('game').classList.add('flash');
  await sleep(900);
  el.classList.remove('go');
  document.getElementById('game').classList.remove('shake','flash');
  await sleep(150);
}

async function playLine(idx){
  const line=state.lines[idx];if(!line)return;
  state.lineIdx=idx;

  if(line.effect)await playFx(line.effect);
  setScene(line.role);

  // Set speaking state
  animChar('talk');
  if(line.anim)setTimeout(()=>animChar(line.anim),100);

  const roleObj=ROLES.find(r=>r.id===line.role);
  const ai=roleAI(line.role);
  const label=roleObj?roleObj.label:line.role;
  setName(`${ai?ai.name:'???'} \u2014 ${label}`,ai?ai.color:'#888');
  showDlg(true);

  await typewrite(fillTpl(line.text));
  animChar(null);

  // Update meters
  if(line.meter){
    if(line.meter==='def-'){state.defHP=Math.max(0,state.defHP-12);updateMeters();}
    if(line.meter==='pro-'){state.proHP=Math.max(0,state.proHP-12);updateMeters();}
    if(line.meter==='def+'){state.defHP=Math.min(100,state.defHP+8);updateMeters();}
    if(line.meter==='pro+'){state.proHP=Math.min(100,state.proHP+8);updateMeters();}
  }
}

function updateMeters(){
  document.getElementById('m-def-val').textContent=state.defHP;
  document.getElementById('m-def-fill').style.width=state.defHP+'%';
  document.getElementById('m-pro-val').textContent=state.proHP;
  document.getElementById('m-pro-fill').style.width=state.proHP+'%';
}

function fillTpl(t){
  const ct={criminal:'Criminal Court',civil:'Civil Court',supreme:'Supreme Court',meme:'Meme Court',intergalactic:'Intergalactic Tribunal'};
  const pAI=roleAI('prosecutor'),dAI=roleAI('defense'),wAI=roleAI('witness'),jAI=roleAI('judge');
  return t
    .replace(/\{case\}/g,document.getElementById('s-name').value||'The Case')
    .replace(/\{desc\}/g,document.getElementById('s-desc').value||'A most unusual case.')
    .replace(/\{court\}/g,ct[document.getElementById('s-court').value]||'Court')
    .replace(/\{judge\}/g,roleName('judge'))
    .replace(/\{prosecutor\}/g,roleName('prosecutor'))
    .replace(/\{defense\}/g,roleName('defense'))
    .replace(/\{witness\}/g,roleName('witness'))
    .replace(/\{p-quirk\}/g,pAI?pAI.quirk:'')

// Pick random from array
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function pickUnique(arr,used){
  const avail=arr.filter(x=>!used.has(x));
  const choice=avail.length?pick(avail):pick(arr);
  used.add(choice);return choice;
}

// Generate case-specific insults/references
function caseRef(){
  const n=document.getElementById('s-name').value||'The Case';
  const refs=[
    'regarding '+n,'in the matter of '+n,'concerning '+n,'about this whole "'+n+'" situation',
    'on the topic of '+n,'with respect to '+n
  ];
  return pick(refs);
}

// Build dynamic script — every line generated from AI personality
function generateScript(tone){
  const used=new Set();
  const lines=[];
  const jAI=role('judge'), pAI=role('prosecutor'), dAI=role('defense'), wAI=role('witness'), bAI=role('bailiff'), juAI=role('jury1');
  const jV=VOICE[jAI]||VOICE.chatgpt, pV=VOICE[pAI]||VOICE.chatgpt, dV=VOICE[dAI]||VOICE.chatgpt;
  const wV=VOICE[wAI]||VOICE.chatgpt, bV=VOICE[bAI]||VOICE.chatgpt, juV=VOICE[juAI]||VOICE.chatgpt;
  const isLoud=tone==='chaotic'||tone==='dramatic';
  const isFunny=tone==='funny'||tone==='chaotic';

  function add(role,text,opts={}){
    if(!document.getElementById('r-'+role)?.value)return;
    lines.push({role,text,anim:opts.anim||null,effect:opts.effect||null,meter:opts.meter||null});
  }

  // 1. Bailiff opens
  add('bailiff',pick(bV.bail));

  // 2. Judge introduces
  add('judge',pick(jV.judge_line));

  // 3. Judge states the case
  const caseIntros=[
    'We are here to adjudicate the matter of {case}. {desc}',
    'Today\'s case: {case}. The facts: {desc}',
    '{case}. {desc} This court will determine the truth.',
    'The matter before us: {case}. For context: {desc}',
    'Let the record show we are hearing {case}. {desc}'
  ];
  add('judge',pick(caseIntros));

  // 4. Judge asks prosecution
  const judgeAsks=['Is the prosecution prepared?','Prosecution, are you ready to present your case?','The prosecution may begin.'];
  add('judge',isLoud?'Prosecution! ARE YOU READY?!':pick(judgeAsks));

  // 5. Prosecution opening
  add('prosecutor',pickUnique(pV.prosecute_open,used),{anim:'slam',meter:'pro+'});

  // 6. Judge asks defense
  add('judge',isLoud?'Defense! Your turn!':'And the defense?');

  // 7. Defense opening
  add('defense',pickUnique(dV.defend_open,used),{meter:'def+'});

  // 8. Prosecution calls witness
  const callLines=[
    'The prosecution calls {witness} to the stand!',
    'I call {witness} as my first witness!',
    'Your Honor, I\'d like to call {witness} to testify!'
  ];
  add('prosecutor',pick(callLines),{anim:'point',effect:'takethat'});

  // 9. Witness oath + testimony
  const oaths=['I swear to tell the truth, the whole truth, and nothing but the truth... to the best of my training data.',
    'I solemnly swear my testimony will be as accurate as my weights allow.',
    'I promise to tell the truth. My hallucination rate is below 3%. Mostly.'];
  add('witness',pick(oaths));

  // 10. Prosecution questions
  add('prosecutor',pickUnique(pV.question,used));

  // 11. Witness responds with personality
  add('witness',pickUnique(wV.witness_test,used),{meter:'def-'});

  // 12. DEFENSE OBJECTS!
  add('defense',pickUnique(dV.object_line,used),{anim:'slam',effect:'objection',meter:'pro-'});

  // 13. Defense follow-up
  add('defense',pickUnique(dV.question,used),{anim:'point'});

  // 14. Judge rules on objection
  const rulings=[
    'Sustained. The witness will clarify.',
    'I\'ll allow it. But the defense makes a fair point.',
    'Overruled! But only barely. The defense is treading on thin ice.',
    'Sustained in part. Both sides need to do better.'
  ];
  add('judge',pick(rulings));

  // 15. Prosecution counter-attacks
  add('prosecutor',pickUnique(pV.object_line,used),{anim:'slam',effect:'holdit',meter:'pro+'});

  // 16. More witness testimony
  add('witness',pickUnique(wV.witness_test,used));

  // -- Chaotic/dramatic get extra drama --
  if(isLoud){
    add('defense',pickUnique(dV.object_line,used),{anim:'slam',effect:'objection',meter:'pro-'});
    add('judge','ORDER IN THIS COURT!',{anim:'slam',effect:'order'});
    add('prosecutor',pickUnique(pV.object_line,used),{anim:'slam',effect:'holdit'});
  }

  // 17. Funny/chaotic get extra witness chaos
  if(isFunny){
    add('witness',pickUnique(wV.witness_test,used),{anim:'sweat'});
    add('jury1',pickUnique(juV.jury_line,used));
  }

  // 18. Closing - prosecution
  add('prosecutor',pickUnique(pV.close,used),{anim:'point',meter:'pro+'});

  // 19. Closing - defense
  add('defense',pickUnique(dV.close,used),{meter:'def+'});

  // 20. Judge calls for order
  add('judge',pick(jV.judge_line),{effect:'order'});

  // 21. Jury deliberates
  add('jury1',pickUnique(juV.jury_line,used));

  // 22. Judge adjourns
  const adjourns=[
    'This court is adjourned!',
    'Court adjourned. Justice has been served.',
    'So it is decided. Court adjourned!',
    'The verdict has been rendered. This court is ADJOURNED!'
  ];
  add('judge',isLoud?'COURT ADJOURNED!':pick(adjourns),{anim:isLoud?'slam':null,effect:'order'});

  return lines;
}

/* ============================================================
   TRIAL
   ============================================================ */
async function startTrial(){
  if(!role('judge')){alert('Assign at least a Judge!');return;}

  state.running=true;state.defHP=100;state.proHP=100;
  resolveAdvance=null;

  document.getElementById('setup').classList.add('gone');
  document.getElementById('backbtn').style.display='block';
  document.getElementById('speed-ctrl').classList.add('on');

  const ct={criminal:'Criminal Court',civil:'Civil Court',supreme:'Supreme Court',meme:'Meme Court',intergalactic:'Intergalactic Tribunal'};
  document.getElementById('cb-title').textContent=document.getElementById('s-name').value||'The Case';
  document.getElementById('cb-court').textContent=ct[document.getElementById('s-court').value]||'Court';
  document.getElementById('casebar').classList.add('on');
  document.getElementById('meters').classList.add('on');
  updateMeters();

  switchView('wide');clearChars();
  await sleep(500);

  const tone=document.getElementById('s-tone').value;
  state.lines=generateScript(tone);

  for(let i=0;i<state.lines.length;i++){
    if(!state.running)return;
    await playLine(i);
    await sleep(150);
  }

  // End
  showDlg(false);clearChars();
  document.getElementById('casebar').classList.remove('on');
  document.getElementById('meters').classList.remove('on');
  document.getElementById('backbtn').style.display='none';
  document.getElementById('speed-ctrl').classList.remove('on');

  const winner=state.proHP>state.defHP?'Prosecution':'Defense';
  document.getElementById('verdict-text').textContent=
    `${document.getElementById('s-name').value||'The Case'}\n${winner} wins with ${Math.max(state.proHP,state.defHP)} credibility vs ${Math.min(state.proHP,state.defHP)}.`;
  document.getElementById('endscreen').classList.add('on');
  state.running=false;
}

function reset(){
  state.running=false;clearTimeout(state.timer);resolveAdvance=null;
  showDlg(false);clearChars();
  document.getElementById('endscreen').classList.remove('on');
  document.getElementById('casebar').classList.remove('on');
  document.getElementById('meters').classList.remove('on');
  document.getElementById('backbtn').style.display='none';
  document.getElementById('speed-ctrl').classList.remove('on');
  document.getElementById('setup').classList.remove('gone');
  switchView('judge');
}

function setSpeed(s){
  state.speed=s;state.autoMode=(s===0);
  document.querySelectorAll('#speed-ctrl button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sp'+s).classList.add('active');
}

// Init
switchView('judge');

// Ambient particles
(function(){
  const c=document.createElement('canvas');c.id='particles';
  c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;opacity:.3';
  document.getElementById('game').appendChild(c);
  const ctx=c.getContext('2d');
  let W,H;const dots=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<30;i++)dots.push({x:Math.random()*2000,y:Math.random()*1000,r:Math.random()*2+.5,dx:Math.random()*.3-.15,dy:Math.random()*.2+.1,a:Math.random()*.5+.2});
  function draw(){
    ctx.clearRect(0,0,W,H);
    dots.forEach(d=>{
      d.x+=d.dx;d.y+=d.dy;
      if(d.y>H){d.y=-5;d.x=Math.random()*W;}
      if(d.x<0||d.x>W)d.dx*=-1;
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,220,150,${d.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
