<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Geometry Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',Arial,sans-serif;color:#fff;user-select:none;-webkit-user-select:none;touch-action:manipulation}
canvas{display:block;width:100%;height:100%}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui-layer>*{pointer-events:auto}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.3s}
.screen.hidden{opacity:0;pointer-events:none!important}
.screen.hidden>*{pointer-events:none!important}
#menu-screen{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0a0f 70%)}
.game-title{font-size:clamp(2rem,8vw,5rem);font-weight:900;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#00ffff,#ff00ff,#ffff00,#00ff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 20px rgba(0,255,255,0.5));margin-bottom:10px;animation:titlePulse 2s ease-in-out infinite}
@keyframes titlePulse{0%,100%{filter:drop-shadow(0 0 20px rgba(0,255,255,0.5))}50%{filter:drop-shadow(0 0 40px rgba(255,0,255,0.8))}}
.subtitle{font-size:clamp(0.8rem,2vw,1.2rem);color:#888;margin-bottom:40px;letter-spacing:2px}
.btn{padding:14px 40px;margin:8px;font-size:clamp(0.9rem,2vw,1.1rem);font-weight:700;border:2px solid;border-radius:8px;cursor:pointer;background:transparent;color:#fff;letter-spacing:1px;transition:all 0.2s;text-transform:uppercase;min-width:200px}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(0.95)}
.btn-play{border-color:#00ffff;box-shadow:0 0 15px rgba(0,255,255,0.3),inset 0 0 15px rgba(0,255,255,0.1)}
.btn-play:hover{background:rgba(0,255,255,0.15);box-shadow:0 0 25px rgba(0,255,255,0.5)}
.btn-practice{border-color:#ff00ff;box-shadow:0 0 15px rgba(255,0,255,0.3),inset 0 0 15px rgba(255,0,255,0.1)}
.btn-practice:hover{background:rgba(255,0,255,0.15);box-shadow:0 0 25px rgba(255,0,255,0.5)}
.btn-back{border-color:#888;box-shadow:0 0 10px rgba(136,136,136,0.2);padding:10px 30px;font-size:0.9rem}
.btn-back:hover{background:rgba(136,136,136,0.15)}
#level-select{background:radial-gradient(ellipse at center,#0a1a2e 0%,#0a0a0f 70%)}
.level-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin:30px 0;max-width:700px}
.level-card{width:clamp(120px,25vw,160px);padding:20px 15px;border:2px solid;border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s;position:relative;overflow:hidden}
.level-card:hover{transform:translateY(-5px)}
.level-card .level-num{font-size:2rem;font-weight:900;margin-bottom:5px}
.level-card .level-name{font-size:0.7rem;letter-spacing:1px;opacity:0.7;text-transform:uppercase;margin-bottom:8px}
.level-card .level-best{font-size:0.75rem;opacity:0.6}
.level-card .difficulty{font-size:0.65rem;margin-top:5px;letter-spacing:1px;text-transform:uppercase}
.progress-bar-small{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-bar-small .fill{height:100%;border-radius:2px;transition:width 0.3s}
#game-hud{position:absolute;top:0;left:0;width:100%;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:20;pointer-events:none}
#game-hud.hidden{display:none}
.hud-left,.hud-right{display:flex;align-items:center;gap:15px}
.hud-text{font-size:clamp(0.7rem,1.5vw,0.9rem);font-weight:600;letter-spacing:1px;text-shadow:0 0 10px rgba(0,0,0,0.8)}
#progress-bar{position:absolute;top:0;left:0;width:100%;height:4px;background:rgba(255,255,255,0.08);z-index:25}
#progress-fill{height:100%;background:linear-gradient(90deg,#00ffff,#ff00ff);border-radius:0 2px 2px 0;transition:width 0.1s linear;box-shadow:0 0 10px rgba(0,255,255,0.5)}
#death-screen{background:rgba(5,5,10,0.85);z-index:30}
.death-text{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;color:#ff3355;text-shadow:0 0 30px rgba(255,51,85,0.6);margin-bottom:5px}
.death-sub{font-size:clamp(0.8rem,2vw,1rem);color:#aaa;margin-bottom:30px}
#complete-screen{background:rgba(5,5,10,0.85);z-index:30}
.complete-text{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#00ff88,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.complete-sub{font-size:clamp(0.8rem,2vw,1rem);color:#aaa;margin-bottom:30px}
.practice-badge{position:absolute;top:15px;right:20px;padding:5px 12px;background:rgba(255,0,255,0.2);border:1px solid #ff00ff;border-radius:4px;font-size:0.7rem;letter-spacing:1px;color:#ff00ff;z-index:26}
.practice-badge.hidden{display:none}
@media(max-width:600px){.btn{min-width:160px;padding:12px 25px}.level-card{width:110px;padding:15px 10px}}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-layer">
  <div id="progress-bar" class="hidden"><div id="progress-fill"></div></div>
  <div id="game-hud" class="hidden">
    <div class="hud-left"><span class="hud-text" id="hud-progress">0%</span></div>
    <div class="hud-right"><span class="hud-text" id="hud-attempts">Attempt 1</span></div>
  </div>
  <div class="practice-badge hidden" id="practice-badge">PRACTICE MODE</div>

  <div class="screen" id="menu-screen">
    <div class="game-title">Geometry Dash</div>
    <div class="subtitle">Tap to the Beat</div>
    <button class="btn btn-play" onclick="showLevelSelect(false)">Play</button>
    <button class="btn btn-practice" onclick="showLevelSelect(true)">Practice</button>
  </div>

  <div class="screen hidden" id="level-select">
    <div class="game-title" style="font-size:clamp(1.5rem,5vw,2.5rem);margin-bottom:5px">Select Level</div>
    <div class="subtitle" id="mode-label">Normal Mode</div>
    <div class="level-grid" id="level-grid"></div>
    <button class="btn btn-back" onclick="showMenu()">Back</button>
  </div>

  <div class="screen hidden" id="death-screen">
    <div class="death-text">Crashed!</div>
    <div class="death-sub" id="death-info">0% - Attempt 1</div>
    <button class="btn btn-play" onclick="restartLevel()">Retry</button>
    <button class="btn btn-back" onclick="showMenu()">Menu</button>
  </div>

  <div class="screen hidden" id="complete-screen">
    <div class="complete-text">Level Complete!</div>
    <div class="complete-sub" id="complete-info">Attempts: 1</div>
    <button class="btn btn-play" onclick="showLevelSelect(G.practiceMode)">Next Level</button>
    <button class="btn btn-back" onclick="showMenu()">Menu</button>
  </div>
</div>

<script>
'use strict';

// ========== CANVAS SETUP ==========
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H, UNIT, GROUND_Y, CEIL_Y;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = window.innerWidth;
  H = window.innerHeight;
  UNIT = Math.min(W, H) * 0.055;
  GROUND_Y = H * 0.78;
  CEIL_Y = H * 0.08;
}
window.addEventListener('resize', resize);
resize();

// ========== AUDIO ==========
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'jump') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.exponentialRampToValueAtTime(780, now + 0.08);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.start(now);
    osc.stop(now + 0.12);
  } else if (type === 'death') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.5);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now);
    osc.stop(now + 0.5);
    // noise burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.3, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    noise.connect(ng);
    ng.connect(audioCtx.destination);
    noise.start(now);
  } else if (type === 'checkpoint') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.setValueAtTime(800, now + 0.1);
    osc.frequency.setValueAtTime(1000, now + 0.2);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.start(now);
    osc.stop(now + 0.35);
  } else if (type === 'portal') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.25);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  } else if (type === 'complete') {
    [0, 0.1, 0.2, 0.3, 0.4].forEach((t, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'square';
      o.frequency.setValueAtTime([523, 659, 784, 1047, 1319][i], now + t);
      g.gain.setValueAtTime(0.08, now + t);
      g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.15);
      o.start(now + t); o.stop(now + t + 0.15);
    });
  }
}

// ========== GAME STATE ==========
const G = {
  state: 'menu', // menu, levelSelect, playing, dead, complete
  practiceMode: false,
  currentLevel: 0,
  attempts: {},
  bestProgress: {},
  cameraX: 0,
  speed: 0,
  baseSpeed: 0,
  player: null,
  particles: [],
  trailParticles: [],
  deathParticles: [],
  checkpoints: [],
  lastCheckpointX: 0,
  bgPulse: 0,
  bgPulseDir: 1,
  inputDown: false,
  jumpBuffered: false,
  totalLength: 0,
  bgStars: [],
  bgLayers: [],
  gameTime: 0,
  screenShake: 0,
  flashAlpha: 0
};

// Generate background stars
function initBgStars() {
  G.bgStars = [];
  for (let i = 0; i < 120; i++) {
    G.bgStars.push({
      x: Math.random() * 3000,
      y: Math.random(),
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      alpha: Math.random() * 0.5 + 0.2,
      twinkle: Math.random() * Math.PI * 2
    });
  }
  G.bgLayers = [];
  for (let layer = 0; layer < 3; layer++) {
    const shapes = [];
    for (let i = 0; i < 15 + layer * 5; i++) {
      shapes.push({
        x: Math.random() * 4000,
        y: Math.random(),
        size: (Math.random() * 20 + 10) * (3 - layer) * 0.4,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.02,
        type: Math.floor(Math.random() * 3),
        alpha: (0.03 + layer * 0.01)
      });
    }
    G.bgLayers.push({ shapes, parallax: 0.1 + layer * 0.08 });
  }
}
initBgStars();

// ========== PLAYER ==========
function createPlayer(x, y) {
  return {
    x: x || UNIT * 5,
    y: y || GROUND_Y - UNIT,
    vy: 0,
    rotation: 0,
    rotationTarget: 0,
    size: UNIT,
    onGround: false,
    mode: 'cube', // cube, ship, wave
    dead: false,
    trail: [],
    squash: 1,
    stretch: 1,
    ghostAlpha: 1
  };
}

// ========== LEVEL DATA ==========
// Obstacle types:
// S = spike, B = block, D = double spike, T = tall spike
// SB = saw blade, P = platform (elevated block)
// C = checkpoint (practice mode)
// Mode portals: MS = ship mode, MW = wave mode, MC = cube mode
// Speed portals: V1 = slow, V2 = normal, V3 = fast, V4 = very fast
// G = ground spike (upward), U = ceiling spike (downward from ceil)

function buildLevel(data) {
  const obs = [];
  const u = UNIT;
  data.forEach(item => {
    const [type, gx, gy_offset, extra] = item;
    const x = gx * u;
    const baseY = GROUND_Y;
    const y = gy_offset !== undefined ? baseY - gy_offset * u : baseY;

    switch(type) {
      case 'S': // spike
        obs.push({ type: 'spike', x, y: y, w: u, h: u });
        break;
      case 'D': // double spike
        obs.push({ type: 'spike', x, y: y, w: u, h: u });
        obs.push({ type: 'spike', x: x + u, y: y, w: u, h: u });
        break;
      case 'T': // triple spike
        obs.push({ type: 'spike', x, y: y, w: u, h: u });
        obs.push({ type: 'spike', x: x + u, y: y, w: u, h: u });
        obs.push({ type: 'spike', x: x + u * 2, y: y, w: u, h: u });
        break;
      case 'B': // block
        const bh = (extra || 1);
        for (let i = 0; i < bh; i++) {
          obs.push({ type: 'block', x, y: y - i * u, w: u, h: u });
        }
        break;
      case 'BW': // wide block
        const bww = extra || 2;
        for (let j = 0; j < bww; j++) {
          obs.push({ type: 'block', x: x + j * u, y: y, w: u, h: u });
        }
        break;
      case 'SB': // saw blade
        obs.push({ type: 'saw', x, y: y - u * 0.5, r: u * 0.6 });
        break;
      case 'P': // platform (elevated block with spike on top)
        obs.push({ type: 'block', x, y: y, w: u, h: u });
        obs.push({ type: 'spike', x, y: y - u, w: u, h: u });
        break;
      case 'J': // jump pad
        obs.push({ type: 'jumppad', x, y: y, w: u, h: u * 0.4 });
        break;
      case 'C': // checkpoint
        obs.push({ type: 'checkpoint', x, y: y - u * 1.5, w: u * 0.3, h: u * 1.5 });
        break;
      case 'MS': // ship mode portal
        obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.5, h: GROUND_Y - CEIL_Y, portalType: 'ship' });
        break;
      case 'MW': // wave mode portal
        obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.5, h: GROUND_Y - CEIL_Y, portalType: 'wave' });
        break;
      case 'MC': // cube mode portal
        obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.5, h: GROUND_Y - CEIL_Y, portalType: 'cube' });
        break;
      case 'V1': obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.2, h: GROUND_Y - CEIL_Y, portalType: 'slow' }); break;
      case 'V2': obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.2, h: GROUND_Y - CEIL_Y, portalType: 'normal' }); break;
      case 'V3': obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.2, h: GROUND_Y - CEIL_Y, portalType: 'fast' }); break;
      case 'V4': obs.push({ type: 'portal', x, y: CEIL_Y, w: u * 1.2, h: GROUND_Y - CEIL_Y, portalType: 'vfast' }); break;
      case 'CS': // ceiling spike
        obs.push({ type: 'ceilspike', x, y: CEIL_Y, w: u, h: u });
        break;
      case 'GAP': // gap in ground
        obs.push({ type: 'gap', x, y: GROUND_Y, w: (extra || 3) * u, h: u * 5 });
        break;
      case 'WALL': // wall segment for wave mode
        const gh = extra || 3;
        const wallY = y;
        obs.push({ type: 'wall', x, y: wallY, w: u * 0.5, h: gh * u });
        break;
    }
  });
  return obs;
}

const LEVELS = [
  {
    name: 'Neon Start',
    color: '#00ffff',
    difficulty: 'Easy',
    bpm: 130,
    baseSpeed: 5.5,
    build: () => {
      const d = [];
      // gentle intro - just spikes spaced out
      d.push(['C', 12, 0]);
      d.push(['S', 15, 0]);
      d.push(['S', 22, 0]);
      d.push(['S', 29, 0]);
      d.push(['D', 36, 0]);
      d.push(['C', 42, 0]);
      d.push(['S', 45, 0]);
      d.push(['B', 50, 0, 1]);
      d.push(['S', 52, 0]);
      d.push(['S', 56, 0]);
      d.push(['D', 60, 0]);
      d.push(['C', 66, 0]);
      d.push(['S', 70, 0]);
      d.push(['S', 73, 0]);
      d.push(['B', 76, 0, 2]);
      d.push(['S', 78, 0]);
      d.push(['S', 82, 0]);
      d.push(['D', 86, 0]);
      d.push(['S', 90, 0]);
      d.push(['C', 95, 0]);
      d.push(['S', 98, 0]);
      d.push(['S', 101, 0]);
      d.push(['S', 104, 0]);
      d.push(['D', 108, 0]);
      d.push(['T', 113, 0]);
      d.push(['S', 120, 0]);
      d.push(['S', 123, 0]);
      d.push(['B', 126, 0, 1]);
      d.push(['S', 128, 0]);
      d.push(['D', 133, 0]);
      return { obstacles: buildLevel(d), length: 140 * UNIT };
    }
  },
  {
    name: 'Cyber Rush',
    color: '#ff00ff',
    difficulty: 'Normal',
    bpm: 145,
    baseSpeed: 6.2,
    build: () => {
      const d = [];
      d.push(['S', 12, 0]);
      d.push(['S', 15, 0]);
      d.push(['D', 19, 0]);
      d.push(['C', 24, 0]);
      d.push(['B', 27, 0, 1]); d.push(['S', 29, 0]);
      d.push(['S', 33, 0]); d.push(['S', 35, 0]);
      d.push(['SB', 39, 1]);
      d.push(['D', 44, 0]);
      d.push(['C', 49, 0]);
      d.push(['S', 52, 0]); d.push(['S', 54, 0]); d.push(['S', 56, 0]);
      d.push(['B', 60, 0, 2]); d.push(['S', 62, 0]);
      d.push(['SB', 66, 1.5]);
      d.push(['T', 70, 0]);
      d.push(['C', 75, 0]);
      // Ship section
      d.push(['MS', 80, 0]);
      d.push(['B', 88, 4, 2]); // upper block
      d.push(['B', 95, -1, 2]); // lower blocks (from ground)
      d.push(['B', 95, 0, 1]);
      d.push(['SB', 102, 3]);
      d.push(['B', 108, 5, 2]);
      d.push(['B', 108, 0, 2]);
      d.push(['MC', 115, 0]);
      d.push(['C', 118, 0]);
      // Back to cube
      d.push(['S', 122, 0]); d.push(['S', 124, 0]);
      d.push(['D', 128, 0]);
      d.push(['V3', 132, 0]); // speed up
      d.push(['S', 136, 0]); d.push(['S', 138, 0]); d.push(['S', 140, 0]);
      d.push(['T', 144, 0]);
      d.push(['D', 149, 0]);
      d.push(['S', 154, 0]); d.push(['S', 156, 0]);
      d.push(['T', 160, 0]);
      return { obstacles: buildLevel(d), length: 168 * UNIT };
    }
  },
  {
    name: 'Plasma Storm',
    color: '#ffff00',
    difficulty: 'Hard',
    bpm: 160,
    baseSpeed: 7.0,
    build: () => {
      const d = [];
      d.push(['V3', 5, 0]);
      d.push(['S', 10, 0]); d.push(['S', 12, 0]);
      d.push(['D', 15, 0]); d.push(['S', 18, 0]);
      d.push(['B', 21, 0, 2]); d.push(['S', 23, 0]);
      d.push(['C', 26, 0]);
      d.push(['SB', 29, 1.5]); d.push(['S', 33, 0]);
      d.push(['T', 36, 0]);
      d.push(['S', 40, 0]); d.push(['SB', 42, 2]);
      d.push(['D', 46, 0]); d.push(['S', 49, 0]);
      d.push(['C', 53, 0]);
      // Wave section
      d.push(['MW', 57, 0]);
      d.push(['WALL', 63, 0, 4]);
      d.push(['WALL', 63, 8, 4]);
      d.push(['WALL', 70, 2, 3]);
      d.push(['WALL', 70, 7, 4]);
      d.push(['WALL', 77, 0, 5]);
      d.push(['WALL', 77, 9, 3]);
      d.push(['WALL', 84, 3, 3]);
      d.push(['WALL', 84, 8, 4]);
      d.push(['MC', 92, 0]);
      d.push(['C', 95, 0]);
      // fast cube section
      d.push(['V4', 98, 0]);
      d.push(['S', 102, 0]); d.push(['S', 104, 0]); d.push(['S', 106, 0]);
      d.push(['B', 109, 0, 1]); d.push(['S', 111, 0]);
      d.push(['T', 114, 0]);
      d.push(['SB', 119, 1.5]);
      d.push(['D', 123, 0]); d.push(['S', 126, 0]);
      d.push(['C', 130, 0]);
      d.push(['S', 133, 0]); d.push(['D', 136, 0]);
      d.push(['T', 140, 0]);
      d.push(['S', 144, 0]); d.push(['S', 146, 0]); d.push(['S', 148, 0]);
      d.push(['B', 151, 0, 2]); d.push(['S', 153, 0]);
      d.push(['D', 157, 0]); d.push(['T', 161, 0]);
      d.push(['S', 166, 0]); d.push(['S', 168, 0]);
      return { obstacles: buildLevel(d), length: 175 * UNIT };

// ========== LEVEL SELECT UI ==========
function buildLevelSelectUI() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const card = document.createElement('div');
    card.className = 'level-card';
    card.style.borderColor = lv.color;
    card.style.boxShadow = `0 0 15px ${lv.color}33, inset 0 0 15px ${lv.color}11`;
    const best = G.bestProgress[i] || 0;
    card.innerHTML = `
      <div class="level-num" style="color:${lv.color}">${i + 1}</div>
      <div class="level-name">${lv.name}</div>
      <div class="difficulty" style="color:${lv.color}">${lv.difficulty}</div>
      <div class="level-best">Best: ${best}%</div>
      <div class="progress-bar-small"><div class="fill" style="width:${best}%;background:${lv.color}"></div></div>
    `;
    card.addEventListener('click', () => startLevel(i));
    card.addEventListener('mouseenter', () => {
      card.style.boxShadow = `0 0 25px ${lv.color}66, inset 0 0 20px ${lv.color}22`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.boxShadow = `0 0 15px ${lv.color}33, inset 0 0 15px ${lv.color}11`;
    });
    grid.appendChild(card);
  });
}

// ========== SCREEN MANAGEMENT ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  if (el) el.classList.remove('hidden');
}

function showMenu() {
  G.state = 'menu';
  showScreen('menu-screen');
  document.getElementById('game-hud').classList.add('hidden');
  document.getElementById('progress-bar').classList.add('hidden');
  document.getElementById('practice-badge').classList.add('hidden');
}

function showLevelSelect(practice) {
  G.practiceMode = practice;
  G.state = 'levelSelect';
  document.getElementById('mode-label').textContent = practice ? 'Practice Mode' : 'Normal Mode';
  document.getElementById('mode-label').style.color = practice ? '#ff00ff' : '#888';
  buildLevelSelectUI();
  showScreen('level-select');
  document.getElementById('game-hud').classList.add('hidden');
  document.getElementById('progress-bar').classList.add('hidden');
  document.getElementById('practice-badge').classList.add('hidden');
}

// ========== START / RESTART ==========
function startLevel(idx) {
  ensureAudio();
  G.currentLevel = idx;
  if (!G.attempts[idx]) G.attempts[idx] = 0;
  G.attempts[idx]++;

  const lv = LEVELS[idx];
  const built = lv.build();
  G.obstacles = built.obstacles;
  G.totalLength = built.length;
  G.baseSpeed = lv.baseSpeed * (UNIT / 30); // scale speed with unit size
  G.speed = G.baseSpeed;
  G.cameraX = 0;
  G.player = createPlayer();
  G.particles = [];
  G.trailParticles = [];
  G.deathParticles = [];
  G.checkpoints = [];
  G.lastCheckpointX = 0;
  G.bgPulse = 0;
  G.gameTime = 0;
  G.screenShake = 0;
  G.flashAlpha = 0;
  G.state = 'playing';

  showScreen(null);
  document.getElementById('game-hud').classList.remove('hidden');
  document.getElementById('progress-bar').classList.remove('hidden');
  if (G.practiceMode) {
    document.getElementById('practice-badge').classList.remove('hidden');
  } else {
    document.getElementById('practice-badge').classList.add('hidden');
  }
  updateHUD();
}

function restartLevel() {
  if (G.practiceMode && G.lastCheckpointX > 0) {
    // restart from checkpoint
    G.attempts[G.currentLevel]++;
    G.cameraX = G.lastCheckpointX - UNIT * 5;
    G.player = createPlayer();
    G.player.x = UNIT * 5;
    G.speed = G.baseSpeed;
    G.player.mode = 'cube'; // reset mode
    G.deathParticles = [];
    G.particles = [];
    G.trailParticles = [];
    G.screenShake = 0;
    G.flashAlpha = 0;
    G.state = 'playing';
    showScreen(null);
    document.getElementById('game-hud').classList.remove('hidden');
    document.getElementById('progress-bar').classList.remove('hidden');
    updateHUD();
  } else {
    startLevel(G.currentLevel);
  }
}

function updateHUD() {
  const progress = Math.min(100, Math.floor((G.cameraX / G.totalLength) * 100));
  document.getElementById('hud-progress').textContent = progress + '%';
  document.getElementById('hud-attempts').textContent = 'Attempt ' + (G.attempts[G.currentLevel] || 1);
  document.getElementById('progress-fill').style.width = progress + '%';
}

// ========== INPUT ==========
function handleInputDown(e) {
  if (e) e.preventDefault();
  ensureAudio();
  G.inputDown = true;
  G.jumpBuffered = true;
}
function handleInputUp(e) {
  if (e) e.preventDefault();
  G.inputDown = false;
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!e.repeat) handleInputDown();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') handleInputUp();
});
canvas.addEventListener('mousedown', handleInputDown);
canvas.addEventListener('mouseup', handleInputUp);
canvas.addEventListener('touchstart', handleInputDown, { passive: false });
canvas.addEventListener('touchend', handleInputUp, { passive: false });

// ========== PHYSICS ==========
const GRAVITY = 0.9;
const JUMP_FORCE = -12.5;
const SHIP_GRAVITY = 0.45;
const SHIP_LIFT = -0.75;
const WAVE_SPEED = 7;

function updatePlayer(dt) {
  const p = G.player;
  if (p.dead) return;

  const scaledDt = dt * 60; // normalize to 60fps

  if (p.mode === 'cube') {
    // Gravity
    p.vy += GRAVITY * scaledDt;
    p.y += p.vy * scaledDt;

    // Ground collision
    if (p.y >= GROUND_Y - p.size) {
      p.y = GROUND_Y - p.size;
      p.vy = 0;
      p.onGround = true;
      // Snap rotation to nearest 90
      p.rotation = Math.round(p.rotation / (Math.PI / 2)) * (Math.PI / 2);
    } else {
      p.onGround = false;
    }

    // Check landing on blocks
    checkBlockLanding(p);

    // Jump
    if (G.jumpBuffered && p.onGround) {
      p.vy = JUMP_FORCE;
      p.onGround = false;
      p.squash = 0.7;
      p.stretch = 1.3;
      playSound('jump');
      spawnJumpParticles(p);
      G.jumpBuffered = false;
    }

    // Continuous jump (hold)
    if (G.inputDown && p.onGround) {
      p.vy = JUMP_FORCE;
      p.onGround = false;
      p.squash = 0.7;
      p.stretch = 1.3;
      playSound('jump');
      spawnJumpParticles(p);
    }

    // Rotation
    if (!p.onGround) {
      p.rotation += 0.08 * scaledDt;
    }

    // Ceiling
    if (p.y < CEIL_Y) {
      p.y = CEIL_Y;
      p.vy = 0;
    }

  } else if (p.mode === 'ship') {
    // Ship mode - hold to fly up
    p.vy += SHIP_GRAVITY * scaledDt;
    if (G.inputDown) {
      p.vy += SHIP_LIFT * scaledDt;
    }
    p.vy = Math.max(-8, Math.min(8, p.vy));
    p.y += p.vy * scaledDt;

    // Boundaries
    if (p.y >= GROUND_Y - p.size) {
      p.y = GROUND_Y - p.size;
      p.vy = 0;
    }
    if (p.y < CEIL_Y) {
      p.y = CEIL_Y;
      p.vy = 0;
    }

    // Tilt based on vy
    p.rotation = p.vy * 0.06;

  } else if (p.mode === 'wave') {
    // Wave mode - up/down with input
    const dir = G.inputDown ? -1 : 1;
    p.vy = dir * WAVE_SPEED;
    p.y += p.vy * scaledDt;

    // Boundaries
    if (p.y >= GROUND_Y - p.size) {
      p.y = GROUND_Y - p.size;
      p.vy = 0;
      killPlayer();
      return;
    }
    if (p.y < CEIL_Y) {
      p.y = CEIL_Y;
      p.vy = 0;
      killPlayer();
      return;
    }

    p.rotation = p.vy * 0.04;
  }

  // Squash/stretch recovery
  p.squash += (1 - p.squash) * 0.15 * scaledDt;
  p.stretch += (1 - p.stretch) * 0.15 * scaledDt;

  // Trail
  G.trailParticles.push({
    x: p.x + G.cameraX - p.size * 0.3,
    y: p.y + p.size * 0.5,
    vx: -Math.random() * 1.5 - 0.5,
    vy: (Math.random() - 0.5) * 1.5,
    life: 1,
    decay: 0.03 + Math.random() * 0.02,
    size: Math.random() * 4 + 2,
    color: LEVELS[G.currentLevel].color
  });
}

function checkBlockLanding(p) {
  const worldX = p.x + G.cameraX;
  G.obstacles.forEach(ob => {
    if (ob.type !== 'block') return;
    // Check if player is above the block and falling
    if (p.vy >= 0 &&
        worldX + p.size * 0.8 > ob.x && worldX + p.size * 0.2 < ob.x + ob.w &&
        p.y + p.size >= ob.y - 2 && p.y + p.size <= ob.y + p.vy + 5) {
      p.y = ob.y - p.size;
      p.vy = 0;
      p.onGround = true;
      p.rotation = Math.round(p.rotation / (Math.PI / 2)) * (Math.PI / 2);
    }
  });
}

// ========== COLLISION ==========
function checkCollisions() {
  const p = G.player;
  if (p.dead) return;
  const worldX = p.x + G.cameraX;
  const px = worldX + p.size * 0.15;
  const py = p.y + p.size * 0.15;
  const pw = p.size * 0.7;
  const ph = p.size * 0.7;

  for (const ob of G.obstacles) {
    // Skip off-screen obstacles
    if (ob.x > worldX + W || ob.x + (ob.w || ob.r * 2 || 0) < worldX - W * 0.5) continue;

    if (ob.type === 'spike' || ob.type === 'ceilspike') {
      // Triangle collision - use inner area
      const sx = ob.x + ob.w * 0.2;
      const sw = ob.w * 0.6;
      const sy = ob.type === 'ceilspike' ? ob.y : ob.y - ob.h * 0.3;
      const sh = ob.h * 0.7;
      if (px + pw > sx && px < sx + sw && py + ph > sy && py < sy + sh) {
        killPlayer();
        return;
      }
    } else if (ob.type === 'block') {
      // Block - check sides for death, top for landing (handled elsewhere)
      if (px + pw > ob.x && px < ob.x + ob.w && py + ph > ob.y && py < ob.y + ob.h) {
        // side collision = death
        if (worldX + p.size * 0.5 < ob.x + ob.w * 0.3) {
          killPlayer();
          return;
        }
      }
    } else if (ob.type === 'saw') {
      const dx = (worldX + p.size * 0.5) - ob.x;
      const dy = (p.y + p.size * 0.5) - ob.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < ob.r + p.size * 0.3) {
        killPlayer();
        return;
      }
    } else if (ob.type === 'wall') {
      if (px + pw > ob.x && px < ob.x + ob.w && py + ph > ob.y && py < ob.y + ob.h) {
        killPlayer();
        return;
      }
    } else if (ob.type === 'jumppad') {
      if (px + pw > ob.x && px < ob.x + ob.w && py + ph > ob.y && py < ob.y + ob.h) {
        p.vy = JUMP_FORCE * 1.5;
        p.onGround = false;
        playSound('jump');
        spawnJumpParticles(p);
        ob._triggered = true;
      }
    } else if (ob.type === 'checkpoint') {
      if (!ob._collected && px + pw > ob.x && px < ob.x + ob.w && py + ph > ob.y && py < ob.y + ob.h) {
        ob._collected = true;
        if (G.practiceMode) {
          G.lastCheckpointX = ob.x;
          playSound('checkpoint');
          spawnCheckpointParticles(ob);
        }
      }
    } else if (ob.type === 'portal' && !ob._used) {
      if (worldX + p.size > ob.x && worldX < ob.x + ob.w) {
        ob._used = true;
        if (ob.portalType === 'ship') {
          p.mode = 'ship';
          p.vy = 0;
          playSound('portal');
        } else if (ob.portalType === 'wave') {
          p.mode = 'wave';
          p.vy = 0;
          playSound('portal');
        } else if (ob.portalType === 'cube') {
          p.mode = 'cube';
          p.vy = 0;
          playSound('portal');
        } else if (ob.portalType === 'slow') {
          G.speed = G.baseSpeed * 0.7;
          playSound('portal');
        } else if (ob.portalType === 'normal') {
          G.speed = G.baseSpeed;
          playSound('portal');
        } else if (ob.portalType === 'fast') {
          G.speed = G.baseSpeed * 1.3;
          playSound('portal');
        } else if (ob.portalType === 'vfast') {
          G.speed = G.baseSpeed * 1.6;
          playSound('portal');
        }
        G.flashAlpha = 0.3;
      }
    } else if (ob.type === 'gap') {
      if (p.mode === 'cube' && px + pw > ob.x && px < ob.x + ob.w && p.y + p.size >= GROUND_Y - 2) {
        // fall through gap
        p.onGround = false;
        if (p.y > GROUND_Y + p.size * 3) {
          killPlayer();
          return;
        }
      }
    }
  }
}

function killPlayer() {
  const p = G.player;
  if (p.dead) return;
  p.dead = true;
  G.screenShake = 15;
  G.flashAlpha = 0.5;
  playSound('death');

  // Death particles
  const worldX = p.x + G.cameraX;
  const color = LEVELS[G.currentLevel].color;
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 8 + 2;
    G.deathParticles.push({
      x: worldX + p.size * 0.5,
      y: p.y + p.size * 0.5,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      size: Math.random() * 6 + 3,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      color
    });
  }

  // Save best progress
  const progress = Math.min(100, Math.floor((G.cameraX / G.totalLength) * 100));
  const best = G.bestProgress[G.currentLevel] || 0;
  if (progress > best) {
    G.bestProgress[G.currentLevel] = progress;
    saveBestProgress();
  }

  setTimeout(() => {
    if (G.state === 'playing') {
      G.state = 'dead';
      document.getElementById('death-info').textContent =
        `${progress}% - Attempt ${G.attempts[G.currentLevel]}`;
      showScreen('death-screen');
    }
  }, 800);
}

function completeLevel() {
  G.state = 'complete';
  G.bestProgress[G.currentLevel] = 100;
  saveBestProgress();
  playSound('complete');

  document.getElementById('complete-info').textContent =
    `Attempts: ${G.attempts[G.currentLevel]}`;
  showScreen('complete-screen');
}

// ========== PARTICLES ==========
function spawnJumpParticles(p) {
  const color = LEVELS[G.currentLevel].color;
  for (let i = 0; i < 8; i++) {
    G.particles.push({
      x: p.x + G.cameraX + p.size * 0.5 + (Math.random() - 0.5) * p.size,
      y: p.y + p.size,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 2 + 1,
      life: 1,
      decay: 0.04 + Math.random() * 0.03,
      size: Math.random() * 4 + 2,
      color
    });
  }
}

function spawnCheckpointParticles(ob) {
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    G.particles.push({
      x: ob.x,
      y: ob.y + ob.h * 0.5,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: Math.random() * 4 + 2,
      color: '#ff00ff'
    });
  }
}

function updateParticles(arr, dt) {
  const s = dt * 60;
  for (let i = arr.length - 1; i >= 0; i--) {
    const pt = arr[i];
    pt.x += (pt.vx || 0) * s;
    pt.y += (pt.vy || 0) * s;
    if (pt.vy !== undefined && pt.type !== 'static') pt.vy += 0.1 * s;
    pt.life -= pt.decay * s;
    if (pt.rotation !== undefined) pt.rotation += (pt.rotSpeed || 0) * s;
    if (pt.life <= 0) arr.splice(i, 1);
  }
}

// ========== RENDERING ==========
function drawBackground() {
  const lv = LEVELS[G.currentLevel] || LEVELS[0];
  const color = lv.color;

  // Dark gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050510');
  grad.addColorStop(0.5, '#0a0a1a');
  grad.addColorStop(1, '#080815');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background pulse
  if (G.state === 'playing') {
    G.bgPulse += G.bgPulseDir * 0.008;
    if (G.bgPulse > 0.12) G.bgPulseDir = -1;
    if (G.bgPulse < 0) G.bgPulseDir = 1;
    ctx.fillStyle = color + Math.floor(G.bgPulse * 255).toString(16).padStart(2, '0');
    ctx.fillRect(0, 0, W, H);
  }

  // Parallax layers
  G.bgLayers.forEach(layer => {
    const offsetX = G.cameraX * layer.parallax;
    layer.shapes.forEach(s => {
      const sx = ((s.x - offsetX) % (W + 200)) - 100;
      const sy = s.y * H;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(s.rotation + G.gameTime * s.rotSpeed);
      ctx.strokeStyle = color;
      ctx.globalAlpha = s.alpha;
      ctx.lineWidth = 1;
      if (s.type === 0) {
        ctx.strokeRect(-s.size / 2, -s.size / 2, s.size, s.size);
      } else if (s.type === 1) {
        ctx.beginPath();
        ctx.moveTo(0, -s.size / 2);
        ctx.lineTo(s.size / 2, s.size / 2);
        ctx.lineTo(-s.size / 2, s.size / 2);
        ctx.closePath();
        ctx.stroke();
      } else {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI / 3) * i - Math.PI / 2;
          const method = i === 0 ? 'moveTo' : 'lineTo';
          ctx[method](Math.cos(a) * s.size / 2, Math.sin(a) * s.size / 2);
        }
        ctx.closePath();
        ctx.stroke();
      }
      ctx.restore();
    });
  });
  ctx.globalAlpha = 1;

  // Stars
  G.bgStars.forEach(star => {
    const sx = ((star.x - G.cameraX * star.speed) % (W + 50));
    const sy = star.y * H;
    const twinkle = 0.5 + 0.5 * Math.sin(G.gameTime * 2 + star.twinkle);
    ctx.fillStyle = `rgba(255,255,255,${star.alpha * twinkle})`;
    ctx.fillRect(sx < 0 ? sx + W + 50 : sx, sy, star.size, star.size);
  });
}

function drawGround() {
  const lv = LEVELS[G.currentLevel] || LEVELS[0];
  const color = lv.color;

  // Check for gaps
  const worldLeft = G.cameraX;
  const worldRight = G.cameraX + W;

  // Ground fill
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground line with glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 15;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Ground grid lines
  ctx.shadowBlur = 0;
  ctx.strokeStyle = color + '15';
  ctx.lineWidth = 1;
  const gridSize = UNIT;
  const startX = -(G.cameraX % gridSize);
  for (let x = startX; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = GROUND_Y + gridSize; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Ceiling
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, 0, W, CEIL_Y);
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, CEIL_Y);
  ctx.lineTo(W, CEIL_Y);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawObstacles() {
  const lv = LEVELS[G.currentLevel] || LEVELS[0];
  const color = lv.color;
  const worldLeft = G.cameraX - UNIT * 2;
  const worldRight = G.cameraX + W + UNIT * 2;

  G.obstacles.forEach(ob => {
    if (ob.x + (ob.w || ob.r * 2 || UNIT * 2) < worldLeft || ob.x > worldRight) return;

    const sx = ob.x - G.cameraX;

    if (ob.type === 'spike') {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.fillStyle = color + '22';
      ctx.beginPath();
      ctx.moveTo(sx + ob.w / 2, ob.y - ob.h);
      ctx.lineTo(sx + ob.w, ob.y);
      ctx.lineTo(sx, ob.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'ceilspike') {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.fillStyle = color + '22';
      ctx.beginPath();
      ctx.moveTo(sx + ob.w / 2, ob.y + ob.h);
      ctx.lineTo(sx + ob.w, ob.y);
      ctx.lineTo(sx, ob.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'block') {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.fillStyle = color + '18';
      ctx.fillRect(sx, ob.y, ob.w, ob.h);
      ctx.strokeRect(sx, ob.y, ob.w, ob.h);
      // inner detail
      ctx.strokeStyle = color + '40';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + ob.w * 0.2, ob.y + ob.h * 0.2, ob.w * 0.6, ob.h * 0.6);
      ctx.restore();
    } else if (ob.type === 'saw') {
      ctx.save();
      const rot = G.gameTime * 3;
      ctx.translate(sx, ob.y);
      ctx.rotate(rot);
      ctx.shadowColor = '#ff3355';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ff3355';
      ctx.lineWidth = 2;
      ctx.fillStyle = '#ff335522';
      ctx.beginPath();
      const teeth = 8;
      for (let i = 0; i < teeth; i++) {
        const a1 = (i / teeth) * Math.PI * 2;
        const a2 = ((i + 0.5) / teeth) * Math.PI * 2;
        ctx.lineTo(Math.cos(a1) * ob.r, Math.sin(a1) * ob.r);
        ctx.lineTo(Math.cos(a2) * ob.r * 0.65, Math.sin(a2) * ob.r * 0.65);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // center
      ctx.beginPath();
      ctx.arc(0, 0, ob.r * 0.2, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff3355';
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'wall') {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.fillStyle = color + '25';
      ctx.fillRect(sx, ob.y, ob.w, ob.h);
      ctx.strokeRect(sx, ob.y, ob.w, ob.h);
      ctx.restore();
    } else if (ob.type === 'jumppad') {
      ctx.save();
      ctx.shadowColor = '#ffff00';
      ctx.shadowBlur = 10;
      ctx.fillStyle = ob._triggered ? '#ffff0055' : '#ffff0033';
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx, ob.y + ob.h);
      ctx.lineTo(sx + ob.w, ob.y + ob.h);
      ctx.lineTo(sx + ob.w * 0.8, ob.y);
      ctx.lineTo(sx + ob.w * 0.2, ob.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // arrow
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + ob.w * 0.5, ob.y + ob.h * 0.7);
      ctx.lineTo(sx + ob.w * 0.5, ob.y + ob.h * 0.2);
      ctx.moveTo(sx + ob.w * 0.3, ob.y + ob.h * 0.4);
      ctx.lineTo(sx + ob.w * 0.5, ob.y + ob.h * 0.15);
      ctx.lineTo(sx + ob.w * 0.7, ob.y + ob.h * 0.4);
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'checkpoint') {
      ctx.save();
      const collected = ob._collected;
      const cc = collected ? '#00ff88' : '#ff00ff';
      ctx.shadowColor = cc;
      ctx.shadowBlur = collected ? 15 : 8;
      ctx.strokeStyle = cc;
      ctx.lineWidth = 2;
      // flag pole
      ctx.beginPath();
      ctx.moveTo(sx, ob.y + ob.h);
      ctx.lineTo(sx, ob.y);
      ctx.stroke();
      // flag
      ctx.fillStyle = cc + '44';
      ctx.beginPath();
      ctx.moveTo(sx, ob.y);
      ctx.lineTo(sx + UNIT * 0.6, ob.y + UNIT * 0.3);
      ctx.lineTo(sx, ob.y + UNIT * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'portal') {
      ctx.save();
      let pc;
      if (ob.portalType === 'ship') pc = '#ff8800';
      else if (ob.portalType === 'wave') pc = '#00ff88';
      else if (ob.portalType === 'cube') pc = '#00ffff';
      else if (ob.portalType === 'slow') pc = '#44aaff';
      else if (ob.portalType === 'normal') pc = '#ffff00';
      else if (ob.portalType === 'fast') pc = '#ff8800';
      else if (ob.portalType === 'vfast') pc = '#ff3355';
      else pc = '#ffffff';

      const pulse = 0.5 + 0.5 * Math.sin(G.gameTime * 4);
      ctx.globalAlpha = 0.15 + pulse * 0.1;
      ctx.fillStyle = pc;
      ctx.fillRect(sx, ob.y, ob.w, ob.h);

      ctx.globalAlpha = 0.6 + pulse * 0.4;
      ctx.strokeStyle = pc;
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, ob.y, ob.w, ob.h);

      // Portal icon
      ctx.globalAlpha = 0.8;
      const mid = ob.y + ob.h / 2;
      ctx.beginPath();
      ctx.arc(sx + ob.w / 2, mid, UNIT * 0.4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(sx + ob.w / 2, mid, UNIT * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  });
}

function drawPlayer() {
  const p = G.player;
  if (p.dead) return;

  const lv = LEVELS[G.currentLevel] || LEVELS[0];
  const color = lv.color;

  ctx.save();
  const cx = p.x + p.size / 2;
  const cy = p.y + p.size / 2;
  ctx.translate(cx, cy);
  ctx.rotate(p.rotation);
  ctx.scale(p.squash, p.stretch);

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;

  if (p.mode === 'cube') {
    // Cube
    ctx.fillStyle = color + '33';
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.strokeRect(-p.size / 2, -p.size / 2, p.size, p.size);
    // Inner detail
    ctx.strokeStyle = color + '66';
    ctx.lineWidth = 1;
    const inn = p.size * 0.3;
    ctx.strokeRect(-inn / 2, -inn / 2, inn, inn);
    // Eye / icon
    ctx.fillStyle = color;
    ctx.fillRect(p.size * 0.05, -p.size * 0.15, p.size * 0.2, p.size * 0.15);
  } else if (p.mode === 'ship') {
    // Ship shape
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(p.size / 2, 0);
    ctx.lineTo(-p.size / 2, -p.size / 2);
    ctx.lineTo(-p.size / 3, 0);
    ctx.lineTo(-p.size / 2, p.size / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Engine glow
    ctx.fillStyle = G.inputDown ? '#ff880088' : '#ff880033';
    ctx.beginPath();
    ctx.moveTo(-p.size / 3, -p.size * 0.2);
    ctx.lineTo(-p.size * 0.7 - (G.inputDown ? 10 : 5), 0);
    ctx.lineTo(-p.size / 3, p.size * 0.2);
    ctx.closePath();
    ctx.fill();
  } else if (p.mode === 'wave') {
    // Wave - diamond shape
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(0, -p.size / 2);
    ctx.lineTo(p.size / 2, 0);
    ctx.lineTo(0, p.size / 2);
    ctx.lineTo(-p.size / 2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Trail line indicator
    ctx.strokeStyle = color + '88';
    ctx.lineWidth = 1.5;
    const dir = G.inputDown ? -1 : 1;
    ctx.beginPath();
    ctx.moveTo(-p.size * 0.6, 0);
    ctx.lineTo(-p.size * 1.2, dir * p.size * 0.4);
    ctx.stroke();
  }

  ctx.restore();
}

function drawTrailParticles() {
  G.trailParticles.forEach(pt => {
    const sx = pt.x - G.cameraX;
    ctx.globalAlpha = pt.life * 0.6;
    ctx.fillStyle = pt.color;
    ctx.fillRect(sx - pt.size / 2, pt.y - pt.size / 2, pt.size, pt.size);
  });
  ctx.globalAlpha = 1;
}

function drawParticles() {
  G.particles.forEach(pt => {
    const sx = pt.x - G.cameraX;
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    ctx.fillRect(sx - pt.size / 2, pt.y - pt.size / 2, pt.size, pt.size);
  });

  G.deathParticles.forEach(pt => {
    const sx = pt.x - G.cameraX;
    ctx.save();
    ctx.translate(sx, pt.y);
    ctx.rotate(pt.rotation || 0);
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    ctx.fillRect(-pt.size / 2, -pt.size / 2, pt.size, pt.size);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-pt.size / 2, -pt.size / 2, pt.size, pt.size);
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawEffects() {
  // Screen flash
  if (G.flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${G.flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
    G.flashAlpha *= 0.9;
    if (G.flashAlpha < 0.01) G.flashAlpha = 0;
  }
}

// ========== SAVE/LOAD ==========
function saveBestProgress() {
  try {
    localStorage.setItem('gdash_best', JSON.stringify(G.bestProgress));
  } catch(e) {}
}
function loadBestProgress() {
  try {
    const d = localStorage.getItem('gdash_best');
    if (d) G.bestProgress = JSON.parse(d);
  } catch(e) {}
}
loadBestProgress();

// ========== MAIN LOOP ==========
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  const rawDt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  const dt = rawDt;

  G.gameTime += dt;

  // Screen shake offset
  let shakeX = 0, shakeY = 0;
  if (G.screenShake > 0) {
    shakeX = (Math.random() - 0.5) * G.screenShake;
    shakeY = (Math.random() - 0.5) * G.screenShake;
    G.screenShake *= 0.88;
    if (G.screenShake < 0.5) G.screenShake = 0;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Always draw background
  drawBackground();

  if (G.state === 'playing') {
    // Update
    G.cameraX += G.speed * dt * 60;

    updatePlayer(dt);
    checkCollisions();

    // Check level complete
    if (G.cameraX >= G.totalLength && !G.player.dead) {
      completeLevel();
    }

    updateHUD();

    // Draw game
    drawGround();
    drawTrailParticles();
    drawObstacles();
    drawPlayer();
    drawParticles();
    drawEffects();

    // Update particles
    updateParticles(G.particles, dt);
    updateParticles(G.trailParticles, dt);
    updateParticles(G.deathParticles, dt);

    // Reset jump buffer after being consumed
    if (!G.inputDown) G.jumpBuffered = false;

  } else if (G.state === 'dead') {
    // Keep drawing the frozen scene
    drawGround();
    drawTrailParticles();
    drawObstacles();
    drawParticles();
    drawEffects();
    updateParticles(G.deathParticles, dt);
    updateParticles(G.trailParticles, dt);
    updateParticles(G.particles, dt);
  } else {
    // Menu/level select - draw ambient ground
    drawGround();
  }

  ctx.restore();
}

requestAnimationFrame(gameLoop);

// ========== INIT ==========
showMenu();
</script>
